<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 生日賓果猜題</title>
    <style>
        :root {
            --bg:        #07071A;
            --surface:   rgba(255,255,255,0.04);
            --card:      rgba(255,255,255,0.07);
            --card-h:    rgba(255,255,255,0.12);
            --border:    rgba(255,255,255,0.1);
            --border-h:  rgba(168,85,247,0.65);

            --purple:    #A855F7;
            --indigo:    #6366F1;
            --cyan:      #22D3EE;
            --pink:      #F472B6;

            --grad:      linear-gradient(135deg,#F472B6,#A855F7,#22D3EE);
            --grad-btn:  linear-gradient(135deg,#A855F7,#6366F1);
            --grad-warm: linear-gradient(135deg,#F472B6,#FBBF24);

            --ok:        #34D399;
            --ok-dim:    rgba(52,211,153,0.13);
            --err:       #F87171;
            --err-dim:   rgba(248,113,113,0.13);
            --gold:      #FBBF24;
            --gold-dim:  rgba(251,191,36,0.13);

            --t1: #F0EDFF;
            --t2: #9B94C4;
            --t3: #4A4680;

            --susu:  #F472B6;
            --shifu: #38BDF8;
            --liu:   #34D399;
            --all:   #FBBF24;

            --r-sm:4px; --r-md:12px; --r-lg:18px; --r-xl:24px;
        }

        *{ margin:0; padding:0; box-sizing:border-box; }

        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei','PingFang TC',sans-serif;
            background:var(--bg);
            color:var(--t1);
            min-height:100vh;
            overflow-x:hidden;
        }

        /* ── animated blobs ── */
        .bg-blobs{ position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
        .blob{
            position:absolute; border-radius:50%;
            filter:blur(90px); opacity:.18;
            animation:blobDrift 12s ease-in-out infinite alternate;
        }
        .blob-1{ width:560px;height:560px; background:#A855F7; top:-120px;left:-120px; animation-delay:0s; }
        .blob-2{ width:440px;height:440px; background:#22D3EE; bottom:-100px;right:-100px; animation-delay:-5s; }
        .blob-3{ width:320px;height:320px; background:#F472B6; top:45%;left:50%; transform:translate(-50%,-50%); animation-delay:-9s; }
        @keyframes blobDrift{
            0%  { transform:translate(0,0)        scale(1); }
            100%{ transform:translate(25px,-18px)  scale(1.12); }
        }
        .blob-3{ animation-name:blobDrift3; }
        @keyframes blobDrift3{
            0%  { transform:translate(-50%,-50%) scale(1); }
            100%{ transform:translate(-50%,-50%) scale(1.14); }
        }

        /* ── screens ── */
        .screen{ display:none; min-height:100vh; position:relative; z-index:1; }
        .screen.active{
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
        }

        /* ═══════ START SCREEN ═══════ */
        #startScreen{ padding:2rem; text-align:center; }

        .logo-mark{
            width:76px; height:76px;
            background:var(--grad);
            border-radius:24px;
            display:flex; align-items:center; justify-content:center;
            font-size:2.4rem;
            margin:0 auto 1.5rem;
            box-shadow:0 0 50px rgba(168,85,247,.45), 0 8px 32px rgba(0,0,0,.5);
        }

        .game-title{
            font-size:clamp(2rem,6vw,3.2rem);
            font-weight:900; letter-spacing:-.03em;
            background:var(--grad);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text;
            animation:titleShimmer 4s linear infinite;
            background-size:200% auto;
        }
        @keyframes titleShimmer{
            0%  { background-position:0% center; }
            100%{ background-position:200% center; }
        }

        .game-subtitle{ color:var(--t2); font-size:1rem; margin-bottom:1.8rem; }

        .players-row{
            display:flex; gap:.65rem;
            justify-content:center; flex-wrap:wrap;
            margin-bottom:1.8rem;
        }
        .player-chip{
            background:var(--card); border:1px solid var(--border);
            border-radius:50px; padding:.45rem 1.1rem;
            font-size:.9rem; color:var(--t2);
            display:flex; align-items:center; gap:.45rem;
            backdrop-filter:blur(10px);
        }
        .pdot{
            width:8px; height:8px; border-radius:50%;
            flex-shrink:0;
        }
        .pdot-s{ background:var(--susu);  box-shadow:0 0 6px var(--susu); }
        .pdot-f{ background:var(--shifu); box-shadow:0 0 6px var(--shifu); }
        .pdot-l{ background:var(--liu);   box-shadow:0 0 6px var(--liu); }

        .rules-card{
            background:var(--card); border:1px solid var(--border);
            border-radius:var(--r-lg); padding:1.4rem 1.8rem;
            max-width:460px; text-align:left; margin-bottom:2rem;
            backdrop-filter:blur(14px);
        }
        .rules-title{
            font-size:.72rem; color:var(--t3);
            text-transform:uppercase; letter-spacing:.1em; margin-bottom:.9rem;
        }
        .rule-item{
            display:flex; align-items:center; gap:.7rem;
            padding:.48rem 0; color:var(--t2); font-size:.9rem;
        }
        .rule-item+.rule-item{ border-top:1px solid rgba(255,255,255,.05); }
        .rule-icon{
            width:30px; height:30px; border-radius:var(--r-sm);
            display:flex; align-items:center; justify-content:center;
            font-size:.95rem; flex-shrink:0;
        }
        .ri-p{ background:rgba(168,85,247,.2); }
        .ri-c{ background:rgba(34,211,238,.15); }
        .ri-g{ background:var(--ok-dim); }
        .ri-r{ background:var(--err-dim); }
        .ri-y{ background:var(--gold-dim); }

        .start-btn{
            padding:.95rem 3.5rem; font-size:1.05rem; font-weight:700;
            background:var(--grad-btn); border:none; border-radius:50px;
            color:#fff; cursor:pointer; font-family:inherit;
            transition:all .2s; letter-spacing:.02em;
            box-shadow:0 0 35px rgba(168,85,247,.45);
        }
        .start-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 0 55px rgba(168,85,247,.65);
        }

        /* ═══════ GRID SCREEN ═══════ */
        #gridScreen{
            padding:1.5rem; gap:1.1rem;
            justify-content:flex-start; padding-top:1.8rem;
        }
        .grid-header{ text-align:center; width:100%; }
        .grid-title{
            font-size:1.3rem; font-weight:800;
            background:var(--grad);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text; margin-bottom:.7rem;
        }

        /* mute button */
        .mute-btn{
            position:fixed; top:1rem; right:1rem; z-index:200;
            background:var(--card); border:1px solid var(--border);
            border-radius:50%; width:40px; height:40px;
            display:none; align-items:center; justify-content:center;
            cursor:pointer; font-size:1.1rem;
            transition:all .2s; backdrop-filter:blur(10px);
        }
        .mute-btn:hover{ border-color:var(--border-h); }

        .stats-row{
            display:flex; gap:.6rem;
            justify-content:center; flex-wrap:wrap;
        }
        .stat-chip{
            background:var(--card); border:1px solid var(--border);
            border-radius:50px; padding:.32rem .9rem;
            font-size:.82rem; color:var(--t2);
            display:flex; align-items:center; gap:.35rem;
            backdrop-filter:blur(8px);
        }
        .stat-chip b{ color:var(--t1); }
        .line-dots{ display:flex; gap:5px; align-items:center; }
        .ldot{
            width:9px; height:9px; border-radius:50%;
            border:2px solid var(--border); background:transparent;
            transition:all .35s;
        }
        .ldot.filled{
            background:var(--gold); border-color:var(--gold);
            box-shadow:0 0 9px var(--gold);
        }

        /* ── fail board ── */
        .fail-board{
            display:flex; gap:.5rem;
            justify-content:center; flex-wrap:wrap;
            margin-top:.5rem;
        }
        .fail-chip{
            background:var(--card); border:1px solid var(--border);
            border-radius:50px; padding:.32rem 1rem;
            font-size:.82rem; color:var(--t2);
            display:flex; align-items:center; gap:.45rem;
            backdrop-filter:blur(8px);
            transition:border-color .35s, box-shadow .35s;
        }
        .fail-chip.worst{
            border-color:rgba(248,113,113,.65);
            box-shadow:0 0 16px rgba(248,113,113,.28);
        }
        .fail-name{ font-weight:600; }
        .fail-sep{ color:var(--t3); font-size:.75rem; }
        .fail-count{
            font-size:1.1rem; font-weight:800; color:var(--t1);
            min-width:1ch; text-align:center;
            transition:color .3s;
        }
        .fail-count.has-err{ color:var(--err); }
        @keyframes countBump{
            0%  { transform:scale(1); }
            45% { transform:scale(1.5); }
            100%{ transform:scale(1); }
        }
        .fail-count.bump{ animation:countBump .38s cubic-bezier(.34,1.56,.64,1); }

        /* ── fail king (win screen) ── */
        .fail-king-box{
            background:var(--err-dim);
            border:1px solid rgba(248,113,113,.35);
            border-radius:var(--r-lg);
            padding:.7rem 2rem; margin-bottom:1.2rem;
            text-align:center;
        }
        .fail-king-text{ font-size:1rem; font-weight:700; color:var(--err); }

        /* ── bingo grid ── */
        .bingo-grid{
            display:grid;
            grid-template-columns:repeat(6,1fr);
            gap:8px; width:min(920px,97vw);
        }

        /* ── RWD：平板 4 欄 ── */
        @media(max-width:899px){
            .bingo-grid{
                grid-template-columns:repeat(4,1fr);
                width:min(700px,97vw);
                gap:7px;
            }
            .cell-name{ font-size:clamp(.8rem,2.8vw,1rem); }
            .cell-target{ font-size:clamp(.66rem,2vw,.82rem); }
            .result-mark{ font-size:clamp(2rem,7vw,3rem); }
        }

        /* ── RWD：手機 3 欄 ── */
        @media(max-width:479px){
            .bingo-grid{
                grid-template-columns:repeat(3,1fr);
                width:98vw;
                gap:5px;
            }
            .cell-name{ font-size:clamp(.72rem,3.5vw,.9rem); }
            .cell-target{ font-size:clamp(.6rem,2.5vw,.75rem); }
            .cell-num{ font-size:.58rem; }
            .result-mark{ font-size:clamp(1.6rem,8vw,2.4rem); }
            .cell-front,.cell-back{ padding:.3rem; }
        }

        /* card flip */
        .grid-cell{
            aspect-ratio:1;
            perspective:700px;
            cursor:pointer;
        }
        .grid-cell.answered{ cursor:default; }

        .cell-inner{
            width:100%; height:100%;
            position:relative;
            transform-style:preserve-3d;
            transition:transform .55s cubic-bezier(.4,0,.2,1);
            border-radius:var(--r-md);
        }
        .cell-inner.flipped{ transform:rotateY(180deg); }

        .cell-front,.cell-back{
            position:absolute; inset:0;
            border-radius:var(--r-md);
            backface-visibility:hidden;
            -webkit-backface-visibility:hidden;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:.45rem; text-align:center;
        }
        .cell-front{
            background:var(--card);
            border:1px solid var(--border);
            transition:border-color .2s, background .2s, box-shadow .2s;
        }
        .grid-cell:not(.answered):hover .cell-front{
            border-color:var(--purple);
            background:var(--card-h);
            box-shadow:0 0 22px rgba(168,85,247,.3), inset 0 0 18px rgba(168,85,247,.06);
        }
        .cell-back{
            transform:rotateY(180deg);
        }
        .cell-back.correct{
            background:var(--ok-dim);
            border:2px solid rgba(52,211,153,.55);
        }
        .cell-back.wrong{
            background:var(--err-dim);
            border:2px solid rgba(248,113,113,.45);
        }

        .cell-num{
            position:absolute; top:5px; left:6px;
            font-size:.7rem; color:var(--t3); font-weight:600;
        }
        .cell-name{
            font-size:clamp(.88rem,2.3vw,1.15rem);
            font-weight:700; color:var(--t1); line-height:1.4;
        }
        .cell-target{
            font-size:clamp(.72rem,1.8vw,.92rem); font-weight:700;
            margin-top:.3rem; padding:.16rem .52rem;
            border-radius:4px; line-height:1.2;
        }
        .ct-susu { background:rgba(244,114,182,.22); color:var(--susu); }
        .ct-shifu{ background:rgba(56,189,248,.2);   color:var(--shifu); }
        .ct-liu  { background:rgba(52,211,153,.2);   color:var(--liu); }
        .ct-all  { background:var(--gold-dim);        color:var(--gold); }

        .result-mark{ font-size:clamp(2.4rem,6vw,3.4rem); }

        .grid-cell.win-hl .cell-back{
            animation:winGlow .8s ease-in-out infinite alternate;
        }
        @keyframes winGlow{
            from{ box-shadow:0 0 8px var(--gold); border-color:var(--gold); }
            to  { box-shadow:0 0 30px var(--gold),0 0 55px rgba(251,191,36,.3); border-color:#fff; }
        }

        /* ═══════ QUESTION OVERLAY ═══════ */
        #questionOverlay{
            position:fixed; inset:0;
            background:rgba(4,3,18,.9);
            backdrop-filter:blur(22px);
            display:none; align-items:center; justify-content:center;
            z-index:500; padding:1.5rem;
        }
        #questionOverlay.open{ display:flex; animation:olIn .22s ease; }
        @keyframes olIn{ from{opacity:0}to{opacity:1} }

        .q-card{
            background:rgba(12,9,38,.92);
            border-radius:var(--r-xl);
            border:1px solid rgba(168,85,247,.35);
            box-shadow:0 0 70px rgba(168,85,247,.18), 0 24px 80px rgba(0,0,0,.75);
            padding:1.5rem 2rem 1.75rem;
            width:min(620px,95vw); max-height:90vh; overflow-y:auto;
            position:relative;
            animation:cardPop .25s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes cardPop{
            from{transform:scale(.9);opacity:0}
            to  {transform:scale(1);opacity:1}
        }

        .q-close{
            position:absolute; top:.9rem; right:.9rem;
            background:var(--card); border:1px solid var(--border);
            color:var(--t3); font-size:.9rem;
            width:30px; height:30px; border-radius:var(--r-sm);
            cursor:pointer; font-family:inherit; transition:all .15s;
            display:flex; align-items:center; justify-content:center;
        }
        .q-close:hover{ background:var(--err-dim); border-color:var(--err); color:var(--err); }

        /* ── timer ── */
        .timer-wrap{
            display:flex; align-items:center; justify-content:center;
            gap:.9rem; margin-bottom:1.2rem;
        }
        .timer-ring{ position:relative; width:64px; height:64px; flex-shrink:0; }
        .timer-svg{ width:64px; height:64px; transform:rotate(-90deg); }
        .timer-track{ fill:none; stroke:rgba(255,255,255,.08); stroke-width:5; }
        .timer-fill{
            fill:none; stroke:var(--ok); stroke-width:5; stroke-linecap:round;
            stroke-dasharray:163.36;
            stroke-dashoffset:0;
            transition:stroke-dashoffset 1s linear, stroke .4s;
        }
        .timer-num{
            position:absolute; inset:0;
            display:flex; align-items:center; justify-content:center;
            font-size:1.3rem; font-weight:800; color:var(--t1);
        }
        .timer-wrap.urgent .timer-ring{
            animation:timerPulse .45s ease-in-out infinite alternate;
        }
        @keyframes timerPulse{
            from{ transform:scale(1); }
            to  { transform:scale(1.1); }
        }
        .timer-timeout{
            font-size:.88rem; font-weight:700; color:var(--err);
            background:var(--err-dim); border:1px solid rgba(248,113,113,.35);
            border-radius:var(--r-sm); padding:.35rem .8rem;
            display:none; animation:fadeUp .3s ease;
        }
        .timer-timeout.show{ display:block; }
        @keyframes fadeUp{
            from{opacity:0;transform:translateY(6px)}
            to  {opacity:1;transform:translateY(0)}
        }

        /* ── question content ── */
        .q-header{
            display:flex; align-items:center; gap:.6rem;
            margin-bottom:1rem; flex-wrap:wrap; padding-right:2.2rem;
        }
        .badge{
            display:inline-flex; align-items:center; gap:.28rem;
            border-radius:50px; padding:.22rem .8rem;
            font-size:.75rem; font-weight:600;
        }
        .badge-type{
            background:rgba(168,85,247,.16);
            border:1px solid rgba(168,85,247,.38);
            color:var(--purple);
        }
        .badge-special{
            background:var(--gold-dim);
            border:1px solid rgba(251,191,36,.32);
            color:var(--gold);
        }
        .q-cat{ font-size:.8rem; color:var(--t3); font-weight:500; }

        .q-text{
            font-size:clamp(.98rem,2.6vw,1.25rem);
            font-weight:600; line-height:1.75;
            margin-bottom:1.1rem; color:var(--t1); white-space:pre-line;
        }

        .q-photo-img{
            width:100%; max-height:300px;
            object-fit:contain;
            border-radius:var(--r-md);
            margin:.7rem 0;
            display:block;
        }
        .q-placeholder{
            background:var(--card); border:2px dashed rgba(255,255,255,.1);
            border-radius:var(--r-md); padding:1.8rem;
            text-align:center; margin:1rem 0; color:var(--t3);
        }
        .q-placeholder .ph-icon{ font-size:2.2rem; margin-bottom:.4rem; }
        .q-placeholder .ph-label{ font-size:.88rem; font-weight:600; color:var(--t2); }
        .q-placeholder .ph-hint{ font-size:.76rem; margin-top:.22rem; }

        .q-choices{
            display:grid; grid-template-columns:1fr 1fr;
            gap:.55rem; margin:1rem 0;
        }
        .q-choice{
            padding:.7rem .9rem;
            border:1px solid var(--border); background:var(--card);
            border-radius:var(--r-sm); color:var(--t2);
            font-size:.88rem; line-height:1.4;
            transition:border-color .15s, background .15s;
        }
        .q-choice:hover{ border-color:rgba(168,85,247,.5); background:var(--card-h); }

        .q-ans{
            background:var(--ok-dim); border:1px solid rgba(52,211,153,.4);
            border-radius:var(--r-md); padding:.95rem 1.1rem;
            margin-top:1.1rem; display:none;
            animation:fadeUp .3s ease;
        }
        .q-ans.show{ display:block; }
        .ans-label{
            font-size:.72rem; color:var(--ok); font-weight:600;
            text-transform:uppercase; letter-spacing:.07em; margin-bottom:.35rem;
        }
        .ans-text{ font-size:1rem; font-weight:600; white-space:pre-line; color:var(--t1); }

        .q-actions{ display:flex; gap:.55rem; margin-top:1.4rem; }
        .btn{
            flex:1; padding:.78rem; border:none; border-radius:var(--r-md);
            font-size:.92rem; font-weight:700; cursor:pointer;
            transition:transform .15s, box-shadow .15s; font-family:inherit;
        }
        .btn:hover{ transform:translateY(-1px); }
        .btn-reveal{
            background:var(--grad-btn); color:#fff;
            box-shadow:0 4px 16px rgba(168,85,247,.35);
        }
        .btn-reveal:hover{ box-shadow:0 6px 28px rgba(168,85,247,.55); }
        .btn-ok{
            background:linear-gradient(135deg,#34D399,#059669); color:#fff; display:none;
            box-shadow:0 4px 16px rgba(52,211,153,.3);
        }
        .btn-ok:hover{ box-shadow:0 6px 28px rgba(52,211,153,.5); }
        .btn-ng{
            background:linear-gradient(135deg,#F87171,#DC2626); color:#fff; display:none;
            box-shadow:0 4px 16px rgba(248,113,113,.3);
        }
        .btn-ng:hover{ box-shadow:0 6px 28px rgba(248,113,113,.5); }
        .btn-ok.show,.btn-ng.show{ display:block; }

        /* ═══════ WIN SCREEN ═══════ */
        #winScreen{ text-align:center; padding:2rem; }
        .win-icon{
            font-size:4.5rem;
            animation:bounce 1.2s ease-in-out infinite alternate;
            filter:drop-shadow(0 0 22px rgba(251,191,36,.65));
        }
        @keyframes bounce{
            from{transform:translateY(0) scale(1)}
            to  {transform:translateY(-14px) scale(1.06)}
        }
        .win-title{
            font-size:clamp(2.5rem,8vw,4rem);
            font-weight:900; letter-spacing:-.03em;
            background:linear-gradient(135deg,#FBBF24,#F472B6,#A855F7);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text; margin:.4rem 0;
        }
        .win-sub{ font-size:1rem; color:var(--t2); margin-bottom:.8rem; }
        .win-lines{
            display:flex; gap:.45rem;
            justify-content:center; flex-wrap:wrap; margin-bottom:2rem;
        }
        .win-chip{
            background:var(--gold-dim); border:1px solid rgba(251,191,36,.3);
            border-radius:50px; padding:.38rem 1rem;
            font-size:.85rem; color:var(--gold); font-weight:600;
        }
        .win-btns{ display:flex; gap:.7rem; justify-content:center; flex-wrap:wrap; }
        .btn-restart{
            padding:.85rem 2.4rem; font-size:.98rem; font-weight:700;
            background:var(--grad-btn); border:none; border-radius:50px;
            color:#fff; cursor:pointer; font-family:inherit;
            transition:all .2s; box-shadow:0 0 28px rgba(168,85,247,.45);
        }
        .btn-restart:hover{ transform:translateY(-2px); box-shadow:0 0 44px rgba(168,85,247,.65); }
        .btn-back{
            padding:.85rem 2.4rem; font-size:.98rem; font-weight:600;
            background:var(--card); border:1px solid var(--border);
            border-radius:50px; color:var(--t2);
            cursor:pointer; font-family:inherit; transition:all .2s;
        }
        .btn-back:hover{ border-color:rgba(168,85,247,.5); color:var(--t1); }

// ════════════════════════════════════════════════
//                 SOUND ENGINE
// ════════════════════════════════════════════════
let audioCtx = null;
let muted = false;

function getCtx(){
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    return audioCtx;
}
function tone(freq, type, startAt, dur, vol=0.22){
    if(muted) return;
    try{
        const ctx = getCtx();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime+startAt);
        gain.gain.setValueAtTime(vol, ctx.currentTime+startAt);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+startAt+dur);
        osc.start(ctx.currentTime+startAt);
        osc.stop(ctx.currentTime+startAt+dur+0.05);
    }catch(e){}
}
function sfxCorrect(){
    tone(523,'sine',0,.12,.22); tone(659,'sine',.10,.12,.22); tone(784,'sine',.20,.22,.28);
}
function sfxWrong(){
    tone(280,'sawtooth',0,.15,.22); tone(180,'sawtooth',.15,.25,.18);
}
function sfxTick(){
    tone(1000,'square',0,.05,.14);
}
function sfxReveal(){
    tone(400,'sine',0,.08,.18); tone(600,'sine',.07,.08,.18); tone(800,'sine',.14,.14,.2);
}
function sfxLine(){
    [523,587,659,784,880].forEach((f,i)=> tone(f,'sine',i*.07,.2,.28));
}
function sfxWin(){
    [523,523,523,415,466,523,466,523].forEach((f,i,a)=>{
        const t=[0,.18,.36,.54,.63,.72,.9,1.0];
        tone(f,'sine',t[i],.2,.32);
    });
    tone(261,'triangle',0,1.2,.16);
    tone(349,'triangle',.5,.7,.16);
}
function toggleMute(){
    muted=!muted;
    document.getElementById('muteBtn').textContent = muted?'🔇':'🔊';
}

//                    TIMER
// ════════════════════════════════════════════════
const TIMER_TOTAL = 30;
const CIRCUMFERENCE = 163.36; // 2π×26
let timerInterval = null;
let timerSecs = TIMER_TOTAL;

function startTimer(){
    timerSecs = TIMER_TOTAL;
    clearInterval(timerInterval);
    document.getElementById('timerTimeout').classList.remove('show');
    document.getElementById('timerWrap').classList.remove('urgent');
    updateTimerUI();
    timerInterval = setInterval(()=>{
        timerSecs--;
        updateTimerUI();
        if(timerSecs > 0 && timerSecs <= 5){
            sfxTick();
            document.getElementById('timerWrap').classList.add('urgent');
        }
        if(timerSecs <= 0){
            clearInterval(timerInterval); timerInterval=null;
            document.getElementById('timerTimeout').classList.add('show');
            revealAnswer();
        }
    },1000);
}
function stopTimer(){
    if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
}
function updateTimerUI(){
    const n = document.getElementById('timerNum');
    const c = document.getElementById('timerCircle');
    if(!n||!c) return;
    const s = Math.max(0,timerSecs);
    n.textContent = s;
    c.style.strokeDashoffset = CIRCUMFERENCE*(1-s/TIMER_TOTAL);
    c.style.stroke = s>15 ? 'var(--ok)' : s>5 ? 'var(--gold)' : 'var(--err)';
}

// ════════════════════════════════════════════════
//               SHUFFLE & START
// ════════════════════════════════════════════════
function shuffle(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}

// 均勻散布：團康題平均分散在 Grid 中，個人題填滿其餘格子
function distributeOrder(){
    const LABELS = ['酥酥','師父','劉宇謙','團康'];
    const COLS   = 6, TOTAL = QUESTIONS.length;
    const allIdx = [...Array(TOTAL).keys()];

    // 取得每個標籤對應的題目 index 池
    function buildPools(){
        const p = {};
        LABELS.forEach(l => p[l] = shuffle(allIdx.filter(i=>(TARGET_MAP[QUESTIONS[i].id]||'團康')===l)));
        return p;
    }

    // 貪婪建立標籤排列，不與左/上鄰格同標籤
    function tryBuildLabelGrid(pool){
        const rem   = {};
        LABELS.forEach(l => rem[l] = pool[l].length);
        const grid  = [];

        for(let i = 0; i < TOTAL; i++){
            const row = Math.floor(i / COLS);
            const col = i % COLS;

            const forbidden = new Set();
            if(col > 0)    forbidden.add(grid[i - 1]);
            if(row > 0)    forbidden.add(grid[i - COLS]);

            // 優先選不衝突且剩餘數量較多的標籤（隨機排序避免偏向）
            let available = shuffle(LABELS.filter(l => !forbidden.has(l) && rem[l] > 0));
            // 若無可用則退回任意有剩餘的標籤
            if(available.length === 0)
                available = shuffle(LABELS.filter(l => rem[l] > 0));
            if(available.length === 0) return null;

            const chosen = available[0];
            grid.push(chosen);
            rem[chosen]--;
        }
        return grid;
    }

    // 驗證是否完全無相鄰同標籤
    function isValid(grid){
        for(let i = 0; i < TOTAL; i++){
            if(i % COLS > 0   && grid[i] === grid[i-1])    return false;
            if(i >= COLS       && grid[i] === grid[i-COLS]) return false;
        }
        return true;
    }

    // 多次嘗試，取第一個完全有效的排列
    let bestGrid = null;
    for(let attempt = 0; attempt < 300; attempt++){
        const pool = buildPools();
        const grid = tryBuildLabelGrid(pool);
        if(grid && isValid(grid)){ bestGrid = grid; break; }
        if(!bestGrid && grid) bestGrid = grid; // 保留最佳退路
    }
    if(!bestGrid) return shuffle(allIdx); // 終極退路

    // 將標籤排列轉為實際題目 index 陣列
    const finalPool = buildPools();
    const ptrs = {};
    LABELS.forEach(l => ptrs[l] = 0);
    return bestGrid.map(label => finalPool[label][ptrs[label]++]);
}
function startGame(){
    state={
        cells:Array(36).fill(null), current:null,
        done:0, correct:0, wrong:0,
        order:distributeOrder(),
        wrongCounts:{'酥酥':0,'師父':0,'劉宇謙':0}
    };
    stopConfetti(); stopTimer();
    renderGrid(); updateFailBoard(); showScreen('gridScreen');
}
function restartGame(){ startGame(); }
function goBackGrid(){ stopConfetti(); showScreen('gridScreen'); }

// ════════════════════════════════════════════════
//                  GRID RENDER
// ════════════════════════════════════════════════
function renderGrid(){
    const grid = document.getElementById('bingoGrid');
    grid.innerHTML = '';
    state.order.forEach((qIdx,i)=>{
        const q = QUESTIONS[qIdx];
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.id = `cell-${i}`;
        const s = state.cells[i];
        const tgt = TARGET_MAP[q.id]||'團康';
        const tc  = TARGET_CLASS[tgt];
        const flipped = s ? 'flipped' : '';
        const backCls = s==='correct'?'correct': s==='wrong'?'wrong':'';
        const mark    = s==='correct'?'⭕': s==='wrong'?'❌':'';
        cell.innerHTML=`
            <div class="cell-inner ${flipped}">
                <div class="cell-front">
                    <span class="cell-num">${q.id}</span>
                    <div class="cell-name">${q.category}</div>
                    <div class="cell-target ${tc}">${tgt}</div>
                </div>
                <div class="cell-back ${backCls}">
                    ${s?`<div class="result-mark">${mark}</div>`:''}
                </div>
            </div>`;
        if(!s) cell.addEventListener('click',()=>openQuestion(i));
        else   cell.classList.add('answered');
        grid.appendChild(cell);
    });
    updateProgress();
}

function updateProgress(){
    document.getElementById('doneCount').textContent    = state.done;
    document.getElementById('correctCount').textContent = state.correct;
    document.getElementById('wrongCount').textContent   = state.wrong;
}

function updateWinHL(){
    document.querySelectorAll('.grid-cell').forEach((cell,i)=>{
        cell.classList.toggle('win-hl', state.completedLines.some(ln=>ln.includes(i)));
    });
}

//               OPEN / CLOSE QUESTION
// ════════════════════════════════════════════════
function openQuestion(idx){
    if(state.cells[idx]!==null) return;
    state.current = idx;
    const q = QUESTIONS[state.order[idx]];

    // reset UI
    document.getElementById('qAnsBox').classList.remove('show');
    document.getElementById('btnReveal').style.display='block';
    document.getElementById('btnOk').classList.remove('show');
    document.getElementById('btnNg').classList.remove('show');
    document.getElementById('qChoices').style.display='none';
    document.getElementById('qPhotoPH').style.display='none';
    document.getElementById('qVideoPH').style.display='none';
    const _img = document.getElementById('qPhotoImg');
    _img.style.display='none'; _img.src='';
    document.getElementById('timerTimeout').classList.remove('show');
    document.getElementById('timerWrap').classList.remove('urgent');

    document.getElementById('qCategory').textContent = `${q.icon} ${q.category}`;
    document.getElementById('qText').textContent     = q.question;
    document.getElementById('qAnsText').textContent  = q.answer;
    document.getElementById('qSpecialBadge').style.display = q.special?'inline-flex':'none';

    const badge = document.getElementById('qTypeBadge');
    if(q.type==='choice'){
        badge.textContent='📋 選擇題';
        const el=document.getElementById('qChoices');
        el.style.display='grid'; el.innerHTML='';
        (q.choices||[]).forEach(c=>{
            const d=document.createElement('div');
            d.className='q-choice'; d.textContent=c;
            el.appendChild(d);
        });
    }else if(q.type==='photo'){
        badge.textContent='🖼️ 看圖題';
        const imgEl  = document.getElementById('qPhotoImg');
        const imgSrc = (typeof QUESTION_IMAGES!=='undefined') && QUESTION_IMAGES[q.id];
        if(imgSrc){
            imgEl.src = imgSrc;
            imgEl.style.display = 'block';
            document.getElementById('qPhotoPH').style.display = 'none';
        } else {
            imgEl.style.display = 'none';
            document.getElementById('qPhotoPH').style.display = 'block';
            document.getElementById('qPhotoPHHint').textContent = q.photoHint||'請插入圖片';
        }
    }else if(q.type==='video'){
        badge.textContent='🎬 影片題';
        document.getElementById('qVideoPH').style.display='block';
        document.getElementById('qVideoPHHint').textContent=q.videoHint||'請插入影片';
    }else if(q.type==='interactive'){
        badge.textContent='🎮 互動題';
    }else if(q.type==='team'){
        badge.textContent='🏆 競賽題';
    }else{
        badge.textContent='💬 文字題';
    }

    document.getElementById('questionOverlay').classList.add('open');
    startTimer();
}

function closeQuestion(){
    stopTimer();
    document.getElementById('questionOverlay').classList.remove('open');
    state.current=null;
}

function revealAnswer(){
    stopTimer();
    sfxReveal();
    document.getElementById('qAnsBox').classList.add('show');
    document.getElementById('btnReveal').style.display='none';
    document.getElementById('btnOk').classList.add('show');
    document.getElementById('btnNg').classList.add('show');
}

// ════════════════════════════════════════════════
//                  MARK RESULT
// ════════════════════════════════════════════════
function markResult(isCorrect){
    stopTimer();
    const idx = state.current;

    // Flip animation — update back face then flip
    const cell = document.getElementById(`cell-${idx}`);
    if(cell){
        const inner = cell.querySelector('.cell-inner');
        const back  = cell.querySelector('.cell-back');
        back.innerHTML = `<div class="result-mark">${isCorrect?'⭕':'❌'}</div>`;
        back.className = `cell-back ${isCorrect?'correct':'wrong'}`;
        cell.classList.add('answered');
        setTimeout(()=>inner.classList.add('flipped'), 40);
    }

    if(isCorrect) sfxCorrect(); else sfxWrong();

    state.cells[idx] = isCorrect?'correct':'wrong';
    state.done++;
    if(isCorrect) state.correct++; else state.wrong++;

    // ── 失誤計數 ──
    if(!isCorrect){
        const q = QUESTIONS[state.order[idx]];
        const tgt = TARGET_MAP[q.id]||'團康';
        if(tgt==='團康'){
            ['酥酥','師父','劉宇謙'].forEach(p=>state.wrongCounts[p]++);
        } else {
            state.wrongCounts[tgt]++;
        }
        updateFailBoard();
    }

    document.getElementById('questionOverlay').classList.remove('open');
    state.current = null;

    setTimeout(()=>{ updateProgress(); }, 600);
}

// ════════════════════════════════════════════════
//                  BINGO CHECK
// ════════════════════════════════════════════════
function checkAllLines(){
    const c = state.cells;
    const lines = [];
    for(let r=0;r<5;r++){
        const ln=[r*5,r*5+1,r*5+2,r*5+3,r*5+4];
        if(ln.every(i=>c[i]==='correct')) lines.push(ln);
    }
    for(let col=0;col<5;col++){
        const ln=[col,col+5,col+10,col+15,col+20];
        if(ln.every(i=>c[i]==='correct')) lines.push(ln);
    }
    const d1=[0,6,12,18,24], d2=[4,8,12,16,20];
    if(d1.every(i=>c[i]==='correct')) lines.push(d1);
    if(d2.every(i=>c[i]==='correct')) lines.push(d2);
    return lines;
}
function descLine(ln){
    const diff=ln[1]-ln[0];
    if(diff===1) return `第 ${Math.floor(ln[0]/5)+1} 列橫排`;
    if(diff===5) return `第 ${(ln[0]%5)+1} 行直排`;
    if(diff===6) return `左上→右下對角線`;
    return `右上→左下對角線`;
}

// ════════════════════════════════════════════════
//                 FAIL BOARD
// ════════════════════════════════════════════════
const FAIL_ID = {'酥酥':'susu','師父':'shifu','劉宇謙':'liu'};

function updateFailBoard(){
    const counts = state.wrongCounts;
    const names  = ['酥酥','師父','劉宇謙'];
    const max    = Math.max(...names.map(k=>counts[k]));

    names.forEach(k=>{
        const id      = FAIL_ID[k];
        const countEl = document.getElementById(`failCount-${id}`);
        const chipEl  = document.getElementById(`failChip-${id}`);
        if(!countEl||!chipEl) return;

        const prev = parseInt(countEl.textContent)||0;
        const curr = counts[k];

        countEl.textContent = curr;
        countEl.classList.toggle('has-err', curr>0);
        // 失誤最多的人標紅框（至少 1 題才標）
        chipEl.classList.toggle('worst', curr>0 && curr===max);

        // 數字跳動動畫
        if(curr > prev){
            countEl.classList.remove('bump');
            void countEl.offsetWidth; // force reflow
            countEl.classList.add('bump');
            setTimeout(()=>countEl.classList.remove('bump'), 400);
        }
    });
}

// ════════════════════════════════════════════════
//                  WIN SCREEN
// ════════════════════════════════════════════════
function showWin(lines){
    const el=document.getElementById('winLines');
    el.innerHTML='';
    lines.slice(0,3).forEach(ln=>{
        const chip=document.createElement('div');
        chip.className='win-chip';
        chip.textContent=descLine(ln)+' 🏅';
        el.appendChild(chip);
    });

    // ── 失誤王計算 ──
    const counts = state.wrongCounts;
    const names  = ['酥酥','師父','劉宇謙'];
    const max    = Math.max(...names.map(k=>counts[k]));
    const fkBox  = document.getElementById('failKingBox');
    const fkText = document.getElementById('failKingText');

    if(max > 0){
        const kings = names.filter(k=>counts[k]===max);
        const allZero = names.every(k=>counts[k]===0);
        if(!allZero){
            fkBox.style.display='block';
            if(kings.length===1){
                fkText.textContent=`😈 失誤王：${kings[0]}（共 ${max} 題答錯）`;
            } else {
                const detail = kings.map(k=>`${k} ${counts[k]}題`).join('　');
                fkText.textContent=`😈 失誤並列：${detail}`;
            }
        }
    } else {
        fkBox.style.display='none';
    }

    showScreen('winScreen');
    startConfetti();
}

// ════════════════════════════════════════════════
//                   CONFETTI
// ════════════════════════════════════════════════
let confettiRAF=null;
function startConfetti(){
    const canvas=document.getElementById('confettiCanvas');
    canvas.style.display='block';
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const ctx=canvas.getContext('2d');
    const colors=['#A855F7','#FBBF24','#34D399','#38BDF8','#F472B6','#6366F1','#F0EDFF'];
    const parts=Array.from({length:170},()=>({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height-canvas.height,
        w:Math.random()*13+5, h:Math.random()*6+4,
        color:colors[Math.floor(Math.random()*colors.length)],
        rot:Math.random()*360,
        vx:(Math.random()-.5)*2, vy:Math.random()*2.5+1.5,
        vr:(Math.random()-.5)*5,
        circle:Math.random()>.5
    }));
    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        parts.forEach(p=>{
            ctx.save();
            ctx.translate(p.x+p.w/2,p.y+p.h/2);
            ctx.rotate(p.rot*Math.PI/180);
            ctx.fillStyle=p.color;
            if(p.circle){ ctx.beginPath(); ctx.arc(0,0,p.w/2,0,Math.PI*2); ctx.fill(); }
            else          ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
            ctx.restore();
            p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
            if(p.y>canvas.height+20){ p.y=-20; p.x=Math.random()*canvas.width; }
        });
        confettiRAF=requestAnimationFrame(draw);
    }
    draw();
}
function stopConfetti(){
    if(confettiRAF){ cancelAnimationFrame(confettiRAF); confettiRAF=null; }
    const c=document.getElementById('confettiCanvas');
    if(c){ c.style.display='none'; c.getContext('2d').clearRect(0,0,c.width,c.height); }
}

window.addEventListener('resize',()=>{
    const c=document.getElementById('confettiCanvas');
    if(c.style.display!=='none'){ c.width=window.innerWidth; c.height=window.innerHeight; }
});
